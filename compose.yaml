services:
  postgres:
    image: postgres:17.10-alpine3.24
    environment:
      POSTGRES_DB: connected_appliance
      POSTGRES_USER: connected_appliance
      POSTGRES_PASSWORD: connected_appliance_local
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U connected_appliance -d connected_appliance"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  postgres-data:
