spring:
  application:
    name: connected-appliance-platform
  jackson:
    deserialization:
      fail-on-unknown-properties: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      show-components: never

app:
  collection:
    vendor-timeout: PT2S
    executor-size: 4
    executor-queue-capacity: 16
    backoff-cap: PT24H
  mock-vendors:
    mock-alpha:
      scenario: SUCCESS
      delay: PT0S
    mock-beta:
      scenario: SUCCESS
      delay: PT0S
